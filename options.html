<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Expander</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="app-title">Text Expander</span>
        <button id="newBtn" class="new-btn">+ New</button>
      </div>
      <div id="snippets" class="snippet-list"></div>
      <div class="sidebar-footer">
        <button id="exportBtn" class="footer-btn">Export YAML</button>
        <button id="importBtn" class="footer-btn">Import YAML</button>
        <input type="file" id="importFile" accept=".yaml,.yml" class="hidden">
      </div>
    </aside>

    <main class="editor">
      <div id="emptyNoSnippets" class="empty-state">
        <svg class="empty-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="6" width="32" height="36" rx="3" stroke="#d0d5dd" stroke-width="2"/>
          <line x1="16" y1="16" x2="32" y2="16" stroke="#d0d5dd" stroke-width="2" stroke-linecap="round"/>
          <line x1="16" y1="22" x2="32" y2="22" stroke="#d0d5dd" stroke-width="2" stroke-linecap="round"/>
          <line x1="16" y1="28" x2="24" y2="28" stroke="#d0d5dd" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <p class="empty-title">No snippets yet</p>
        <p class="empty-sub">Click <strong>+ New</strong> to create your first snippet</p>
      </div>

      <div id="emptySelect" class="empty-state hidden">
        <svg class="empty-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M28 24H12M12 24L18 18M12 24L18 30" stroke="#d0d5dd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="8" y="6" width="32" height="36" rx="3" stroke="#d0d5dd" stroke-width="2"/>
        </svg>
        <p class="empty-title">Select a snippet</p>
        <p class="empty-sub">Choose a snippet from the list to edit it</p>
      </div>

      <div id="editorPanel" class="editor-panel hidden">
        <div class="editor-header">
          <h2 id="editorTitle">New Snippet</h2>
          <button id="deleteBtn" class="delete-btn hidden">Delete</button>
        </div>
        <div class="form-group">
          <label for="shortcut">Shortcut</label>
          <input type="text" id="shortcut" placeholder="e.g. :sig" autocomplete="off" spellcheck="false">
        </div>
        <div class="form-group">
          <label for="description">Description <span class="optional">optional</span></label>
          <input type="text" id="description" placeholder="What does this expand to?">
        </div>
        <div class="form-group expansion-group">
          <label for="expansion">Expansion</label>
          <textarea id="expansion" placeholder="The text to insert..."></textarea>
        </div>
        <div class="form-actions">
          <button id="saveBtn">Save</button>
          <button id="cancelBtn" class="cancel-btn">Cancel</button>
        </div>
      </div>
    </main>
  </div>

  <script src="options.js"></script>
</body>
</html>
